<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<style>
*{margin:0;padding:0}
body{width:100vw;height:100vh;display:flex;background:#fff}
#container{width:100%;height:100%}
</style>
</head>
<body>
<div id="container"></div>
<script>
window.onload = async ()=>{
    const ruffle = RufflePlayer.newest();
    const player = ruffle.createPlayer();
    document.getElementById("container").append(player);
    await player.load("game.swf");
    player.config.autoplay = true;
    player.config.touchEvents = true;
}
</script>
</body>
</html>
